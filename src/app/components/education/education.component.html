<section id="education" class="section education">
  <div class="container">
    <div class="section-header">
      <h2 class="section-title">Education</h2>
      <p class="section-subtitle">
        Academic foundation that shaped my technical journey
      </p>
    </div>

    <div class="education-card glass-card">
      <div class="education-visual">
        <div class="graduation-icon">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
            <path d="M6 12v5c3 3 9 3 12 0v-5"/>
          </svg>
        </div>
        <div class="education-year">
          <span>2016</span>
          <div class="year-line"></div>
          <span>2020</span>
        </div>
      </div>

      <div class="education-content">
        <h3 class="institution">{{ education.institution }}</h3>
        <div class="degree-info">
          <span class="degree">{{ education.degree }}</span>
          <span class="field-separator">in</span>
          <span class="field">{{ education.field }}</span>
        </div>
        <div class="education-tags">
          <span class="tag">Engineering</span>
          <span class="tag">Technology</span>
          <span class="tag">Innovation</span>
        </div>
      </div>
    </div>
  </div>
</section>
