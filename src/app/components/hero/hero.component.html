<section id="home" class="hero">
  <!-- Animated Background -->
  <div class="hero-bg">
    <div class="gradient-orb orb-1"></div>
    <div class="gradient-orb orb-2"></div>
    <div class="gradient-orb orb-3"></div>
    <div class="grid-overlay"></div>
  </div>

  <div class="hero-content">
    <div class="hero-badge">
      <span class="badge-dot"></span>
      Available for Opportunities
    </div>

    <h1 class="hero-name">
      Sai Sujeeth
      <span class="hero-name-accent">Kaparaboina</span>
    </h1>

    <div class="hero-title">
      <span class="title-prefix">&lt;</span>
      <span class="typewriter">{{ displayText }}</span>
      <span class="cursor">|</span>
      <span class="title-suffix">/&gt;</span>
    </div>

    <p class="hero-description">
      Building scalable enterprise solutions with 
      <span class="highlight">Spring Boot</span>, 
      <span class="highlight">Spring Framework</span>, and 
      <span class="highlight">Microservices Architecture</span>
    </p>

    <div class="hero-cta">
      <a href="#" class="btn btn-primary" (click)="$event.preventDefault()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
          <polyline points="10 9 9 9 8 9"/>
        </svg>
        View Resume
      </a>
      <a 
        href="#about" 
        class="btn btn-secondary"
        (click)="scrollTo('about'); $event.preventDefault()"
      >
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
          <polyline points="22,6 12,13 2,6"/>
        </svg>
        Contact Me
      </a>
    </div>

    <div class="hero-stats">
      <div class="stat">
        <span class="stat-value">2+</span>
        <span class="stat-label">Years Experience</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <span class="stat-value">10+</span>
        <span class="stat-label">Technologies</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <span class="stat-value">2</span>
        <span class="stat-label">Enterprise Clients</span>
      </div>
    </div>
  </div>


</section>
